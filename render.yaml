services:
  - type: web
    name: xtt-pilot
    runtime: node
    plan: free
    buildCommand: |
      echo "BUILD $(date) $(git rev-parse --short HEAD)" &&
      cd backend && npm install --production && cd ..
    startCommand: node render-start.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MVP_SECRET
        value: xtt-mvp-prod-secret-2026
      - key: MVP_INTERNAL_KEY
        value: worker-key-2026-prod
      # === HQ 总部端（在 Render Dashboard 手动填入实际值） ===
      - key: HQ_JWT_SECRET
        sync: false  # 生产用 dashboard 填，不入仓
      - key: HQ_BASE_URL
        value: https://xtt-pilot.onrender.com
      - key: HQ_WEBHOOK_CSNC
        sync: false
      - key: HQ_WEBHOOK_XQ
        sync: false
      - key: HQ_WEBHOOK_TXP
        sync: false
