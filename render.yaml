services:
  - type: web
    name: xtt-pilot
    runtime: node
    plan: free
    buildCommand: cd backend && npm install --production
    startCommand: node render-start.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MVP_SECRET
        value: xtt-mvp-prod-secret-2026
      - key: MVP_INTERNAL_KEY
        value: worker-key-2026-prod
